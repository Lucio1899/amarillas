<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para vos 💜</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #4c1d95;
    overflow: hidden;
}


.flor {
    position: absolute;
    width: 55px;
    height: 55px;
    animation: subir linear infinite;
    cursor: pointer;
}

.petalo {
    width: 20px;
    height: 20px;
    background: #ffeb3b;
    border-radius: 50%;
    position: absolute;
    opacity: 0.9;
}

.petalo:nth-child(1){ top:0; left:17px;}
.petalo:nth-child(2){ top:17px; left:34px;}
.petalo:nth-child(3){ top:34px; left:17px;}
.petalo:nth-child(4){ top:17px; left:0;}

.centro {
    width: 20px;
    height: 20px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top:17px;
    left:17px;
}
@keyframes subir {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}


.pantalla {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}

.activa {
    display: flex;
}

h1 {
    color: #ffeb3b;
    max-width: 400px;
    text-shadow: 0 0 10px rgba(0,0,0,0.4);
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 20px;
    background: #ffeb3b;
    color: #4c1d95;
    font-weight: bold;
    cursor: pointer;
}

img {
    max-width: 80%;
    border-radius: 20px;
    margin-top: 20px;
}
#subtitulo {
    position: fixed;
    top: 20px; 
    width: 100%;
    text-align: center;
    color: #ffeb3b;
    font-size: 24px; 
    font-weight: bold;
    opacity: 0.9;
    text-shadow: 0 0 10px black;
    padding: 0 10px;
}
video {
    display: none;
}
</style>
</head>

<body>


<video id="musica" loop playsinline>
    <source src="audio/musicas.mp3" type="audio/mp3">
</video>

</div>

<script>

// 🌼 FLORES
setInterval(crearFlor, 900);

function crearFlor(){
    let flor = document.createElement("div");
    flor.className = "flor";
    flor.style.left = Math.random()*100 + "vw";
    flor.style.animationDuration = (6 + Math.random()*4) + "s";

    for(let i=0;i<4;i++){
        let p = document.createElement("div");
        p.className = "petalo";
        flor.appendChild(p);
    }

    let c = document.createElement("div");
    c.className = "centro";
    flor.appendChild(c);

    document.body.appendChild(flor);

    // 👆 AL TOCAR → CAE
    flor.onclick = ()=>{
        flor.style.animation = "none";

        let y = flor.getBoundingClientRect().top;
        let caer = setInterval(()=>{
            y += 10;
            flor.style.top = y + "px";

            if(y > window.innerHeight){
                clearInterval(caer);
                flor.remove();
            }
        },20);
    };

    setTimeout(()=>flor.remove(),12000);
}

let i = 0;

setInterval(()=>{
    let sub = document.getElementById("subtitulo");

}, 3000);

function ver(){
    document.getElementById("p1").classList.remove("activa");
    document.getElementById("p2").classList.add("activa");

    let v = document.getElementById("musica");

    v.volume = 0.05;

    v.play().then(()=>{
        let subir = setInterval(()=>{
            if(v.volume < 1){
                v.volume += 0.05;
            } else {
                clearInterval(subir);
            }
        },300);
    }).catch(()=>{
        alert("Toca la pantalla para activar la música 🎶");
    });
}
</script>
